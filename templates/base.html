<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pub Finder{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- oat CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/knadh/oat@gh-pages/oat.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- App CSS -->
    <link rel="stylesheet" href="/static/app.css?v=16">
</head>
<body>
    <nav data-topnav>
        <div class="row">
            <a href="/"><strong>Pub Finder</strong></a>
            <div>
                <a href="/">Home</a>
                <a href="/how-it-works">How it works</a>
                <a href="/feedback">Feedback</a>
                <a href="https://github.com/detrin/pub-finder">GitHub</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
                    <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>Created by <a href="https://www.hermandaniel.com">Daniel Herman</a> &mdash;
            <a href="https://github.com/detrin/pub-finder">GitHub</a></p>
        </footer>
    </div>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

    <!-- oat JS -->
    <script src="https://cdn.jsdelivr.net/gh/knadh/oat@gh-pages/oat.min.js" defer></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App JS -->
    <script src="/static/app.js?v=10"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
