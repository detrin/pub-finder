{% extends "base.html" %}

{% block title %}{{ session.name }} — Pub Finder{% endblock %}

{% block content %}
<div class="session-heading" data-session-code="{{ session.code }}" data-session-name="{{ session.name }}">
    <div class="session-heading__title">
        <span class="session-heading__eyebrow">Session</span>
        <h1 class="session-heading__name">{{ session.name }}</h1>
    </div>
    <button class="session-heading__share" aria-label="Copy invite link"
        onclick="var btn = this; navigator.clipboard.writeText(window.location.origin + '/session/join?code={{ session.code }}').then(function() { btn.setAttribute('data-copied', ''); setTimeout(function() { btn.removeAttribute('data-copied'); }, 2000); });">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="session-heading__share-label">Invite</span>
        <span class="session-heading__share-copied">Copied!</span>
    </button>
</div>

<script>window.__ALL_STOPS = {{ all_stops | tojson }};</script>

<dialog id="stop-picker-dialog" class="stop-picker">
    <form method="dialog" class="stop-picker__form">
        <header class="stop-picker__header">
            <h4 class="stop-picker__title">Select a stop</h4>
            <button type="submit" class="stop-picker__close" aria-label="Close" value="cancel">&times;</button>
        </header>
        <input type="search" class="stop-picker__search" placeholder="Type to filter stops..." autocomplete="off" autofocus>
        <ul class="stop-picker__list"></ul>
    </form>
</dialog>

{% include "partials/session_participants.html" %}

<article class="card">
    <h4>Search for a Meeting Point</h4>
    <form hx-post="/session/{{ session.code }}/search" hx-target="#results-section" hx-swap="innerHTML" hx-indicator="#search-btn">
        <div class="row">
            <div class="col-2">
                <label data-field>
                    Departure date
                    <input type="date" name="departure_date" value="{{ default_date }}"
                        min="{{ today }}" max="{{ max_date }}">
                </label>
            </div>
            <div class="col-2">
                <label data-field>
                    Departure time
                    <input type="time" name="departure_time" value="{{ default_departure }}">
                </label>
            </div>
            <div class="col-2">
                <label data-field>
                    Return date
                    <input type="date" name="return_date" value="{{ default_return_date }}"
                        min="{{ today }}" max="{{ max_date }}">
                </label>
            </div>
            <div class="col-2">
                <label data-field>
                    Return time
                    <input type="time" name="return_time" value="{{ default_return }}">
                </label>
            </div>
        </div>
        <div class="row search-options-row" style="margin-top: 0.5rem;">
            <div class="col-2">
                <div data-field>
                    <label>Method</label>
                    <select name="method" aria-label="Optimization method">
                        <option value="minimize-worst-case">Minimize longest travel</option>
                        <option value="minimize-total">Minimize total travel</option>
                    </select>
                </div>
            </div>
            <div class="col-2">
                <div data-field>
                    <label>Optimize</label>
                    <select name="direction" aria-label="Optimization direction">
                        <option value="round-trip">Round trip</option>
                        <option value="there-only">There only</option>
                        <option value="back-only">Back only</option>
                    </select>
                </div>
            </div>
            <div class="col-3">
                <div data-field>
                    <label>Place types</label>
                    <div class="place-type-checks">
                        <label class="place-type-check"><input type="checkbox" name="place_types" value="pub" checked> Pubs</label>
                        <label class="place-type-check"><input type="checkbox" name="place_types" value="bar" checked> Bars</label>
                        <label class="place-type-check"><input type="checkbox" name="place_types" value="cafe" checked> Cafes</label>
                        <label class="place-type-check"><input type="checkbox" name="place_types" value="restaurant"> Restaurants</label>
                    </div>
                </div>
            </div>
            <div class="col-1">
                <label data-field>
                    <span style="visibility: hidden;">&nbsp;</span>
                    <button type="submit" id="search-btn" style="width: 100%;">
                        <span class="htmx-indicator">Searching...</span>
                        <span class="search-label">Search</span>
                    </button>
                </label>
            </div>
        </div>
    </form>
</article>

<div id="results-section"></div>

<script>
document.addEventListener("htmx:afterSwap", function (event) {
    if (event.detail.target && event.detail.target.id === "results-section") {
        // Show the share results link after search completes
        var link = document.getElementById("share-results-link");
        if (link) link.style.display = "";
    }
});
</script>
<p id="share-results-link" style="display: none; text-align: center; margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.6;">
    <a href="/session/{{ session.code }}/results" target="_blank">Share results link</a>
</p>
{% endblock %}
