{% extends "base.html" %}

{% block content %}
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">

    <div class="card">
        <div class="card-body">
            <h3>Create a Session</h3>
            <form hx-post="/session/create" hx-target="body">
                <div class="form-group">
                    <label for="create-name">Your Name</label>
                    <input type="text" id="create-name" name="name" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3>Join a Session</h3>
            <form action="/session/join" method="get">
                <div class="form-group">
                    <label for="join-code">Session Code</label>
                    <input type="text" id="join-code" name="code" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="join-name">Your Name</label>
                    <input type="text" id="join-name" name="name" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Join</button>
            </form>
        </div>
    </div>

</div>
{% endblock %}
