{% if error %}
<div class="alert alert-danger" role="alert">
    {{ error }}
</div>
{% elif results %}
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>#</th>
            {% for col in results.columns %}
            <th>{{ col }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for row in results.rows() %}
        <tr>
            <td>{{ loop.index }}</td>
            {% for val in row %}
            <td>{{ val }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted">No results yet.</p>
{% endif %}
