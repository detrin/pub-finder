<form hx-post="/session/{{ session_code }}/stops" hx-target="#participant-list" hx-swap="outerHTML" style="margin-bottom: 1.5rem;">
    <input type="hidden" name="participant_id" value="{{ participant.id }}">
    <p><strong>{{ participant.name }}</strong></p>

    <div class="form-group">
        <label>From</label>
        <select name="start_stop" class="form-control">
            <option value="">-- Select stop --</option>
            {% for stop in all_stops %}
            <option value="{{ stop }}" {% if participant.start_stop == stop %}selected{% endif %}>{{ stop }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>
            <input type="checkbox" name="same_start_end" value="true"
                {% if participant.same_start_end %}checked{% endif %}
                onchange="this.closest('form').querySelector('[name=end_stop]').disabled = this.checked;">
            Return to start
        </label>
    </div>

    <div class="form-group">
        <label>To</label>
        <select name="end_stop" class="form-control" {% if participant.same_start_end %}disabled{% endif %}>
            <option value="">-- Select stop --</option>
            {% for stop in all_stops %}
            <option value="{{ stop }}" {% if participant.end_stop == stop %}selected{% endif %}>{{ stop }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
</form>
