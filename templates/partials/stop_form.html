<form hx-post="/session/{{ session_code }}/stops" hx-target="#participant-list" hx-swap="innerHTML" class="stop-form">
    <input type="hidden" name="participant_id" value="{{ participant.id }}">
    <div class="stop-form-row">
        <div class="stop-form-name">
            <strong>{{ participant.name }}</strong>
            <label class="stop-form-return">
                <input type="checkbox" name="same_start_end" value="true"
                    {% if participant.same_start_end %}checked{% endif %}
                    onchange="this.closest('form').querySelector('[name=end_stop]').disabled = this.checked;">
                return
            </label>
        </div>
        <label data-field>
            From
            <input type="text" name="start_stop" list="stops-list" placeholder="Search..."
                value="{{ participant.start_stop }}" autocomplete="off">
        </label>
        <label data-field>
            To
            <input type="text" name="end_stop" list="stops-list" placeholder="Search..."
                value="{{ participant.end_stop }}" autocomplete="off"
                {% if participant.same_start_end %}disabled{% endif %}>
        </label>
        <button type="submit" class="small">Save</button>
    </div>
</form>
