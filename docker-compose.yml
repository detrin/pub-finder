version: '3.8'

services:
  pub-finder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pub-finder
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
